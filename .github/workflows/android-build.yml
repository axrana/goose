name: Android Build
on:
  push: { branches: [ main, android-port ] }
  pull_request: { branches: [ main ] }
jobs:
  build:
    runs-on: ubuntu-latest
    env: { FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' }
      - run: cargo install cargo-ndk
      - run: |
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          cd android && chmod +x build-rust-android.sh && ./build-rust-android.sh
      - run: |
          cd android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with: { name: app-debug, path: android/app/build/outputs/apk/debug/app-debug.apk }
