name: Build Android APK

on:
  push:
    branches: [ main, android-port ]
  pull_request:
    branches: [ main, android-port ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            build-tools;35.0.0
            ndk;27.0.12077973
            platform-tools
            platforms;android-35

      - name: Set NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            RustCore/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust core for Android
        working-directory: android
        run: bash build-rust-android.sh

      - name: Generate UniFFI Kotlin bindings
        working-directory: RustCore
        run: |
          cargo run --bin uniffi-bindgen generate \
            --library target/aarch64-linux-android/release/libgoosecore.so \
            --language kotlin \
            --out-dir ../android/app/src/main/java/com/goose/android/bridge/uniffi/

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: "Android Build #${{ github.run_number }}"
          body: |
            Automated Android APK build.

            How to install:
            1. Download goose-android-debug.apk below
            2. On your phone go to Settings > Security > Install unknown apps > Allow
            3. Open the APK file and tap Install
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
