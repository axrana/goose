name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: goose-android/package-lock.json

      - name: Install Node dependencies
        working-directory: goose-android
        run: npm ci

      - name: Build web assets
        working-directory: goose-android
        run: npm run build

      - name: Sync Capacitor
        working-directory: goose-android
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: goose-android/android
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('goose-android/android/**/*.gradle*', 'goose-android/android/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        working-directory: goose-android/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: goose-debug-apk
          path: goose-android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        working-directory: goose-android/android
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
          echo "APK path: $APK"
